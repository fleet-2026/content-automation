# Netlify build configuration for this Next.js app.
# Netlify auto-detects Next.js, but pinning these makes the build reliable.

[build]
  # Create/sync the database schema (incl. pgvector) on the direct connection,
  # then build the Next.js app. Safe to re-run on every deploy.
  command = "npx prisma db push && npm run build"

[build.environment]
  # Next.js 16 + Prisma build best on Node 20.
  NODE_VERSION = "20"

# Official Netlify adapter for Next.js (handles routing, server functions, etc.)
[[plugins]]
  package = "@netlify/plugin-nextjs"
