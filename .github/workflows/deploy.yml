name: Deploy to Vercel (production)

# Triggers on push to master OR manual run from the Actions tab.
# We sidestep Vercel's native Git integration (which requires the Vercel
# team's GitHub login to match the repo owner) by running `vercel deploy`
# from CI using a personal access token. Functionally identical to native
# auto-deploy with an extra ~30s of CI overhead.
on:
  push:
    branches: [master]
  workflow_dispatch: # allow manual "Run workflow" trigger from GitHub UI

# Serialize prod deploys — two near-simultaneous pushes shouldn't race.
concurrency:
  group: vercel-deploy-prod
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Bumped from 15m: Vercel server-side builds were hitting the cap and the
    # job got cancelled mid-build, so production never updated. 30m gives a
    # slow/queued build room to finish.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Server-side build path. Previously tried `vercel build` + `vercel deploy
      # --prebuilt` for runner-side caching, but Next.js 16 + Vercel CLI didn't
      # emit `.vercel/output/builds.json` on the prebuilt path so the upload
      # rejected with ENOENT. Letting Vercel build it on their infra is slower
      # by ~30s but matches the manual `vercel deploy --prod` workflow and is
      # the path Vercel actively maintains.
      # --logs streams Vercel's build output into the Actions log so a hung or
      # failing build (e.g. a build-time error or a billing/usage block) is
      # visible here instead of silently sitting on "Building…" until timeout.
      # Deploy from a copy of the checkout with the .git metadata removed.
      # Vercel's Hobby plan blocks any deployment whose git commit author can't
      # be matched to the account, and our merge commits are authored with an
      # email that isn't on the GitHub account — so every git-attributed deploy
      # was Blocked ("commit author could not be matched"). With no .git folder,
      # the CLI does a plain token-authorized upload with no author to check,
      # which sidesteps the block. The only cost is cosmetic: the Vercel
      # dashboard won't show the source commit for these deployments.
      - name: Deploy to Vercel
        run: |
          rm -rf /tmp/vercel-src
          mkdir -p /tmp/vercel-src
          cp -a . /tmp/vercel-src/
          rm -rf /tmp/vercel-src/.git
          cd /tmp/vercel-src
          vercel deploy --prod --yes --logs --token=${{ secrets.VERCEL_TOKEN }}
